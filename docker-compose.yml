services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nis2_ready
      POSTGRES_USER: nis2
      POSTGRES_PASSWORD: nis2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nis2_ready
      SPRING_DATASOURCE_USERNAME: nis2
      SPRING_DATASOURCE_PASSWORD: nis2
      JWT_SECRET: change-this-development-secret-change-this
      EVIDENCE_STORAGE_PATH: /data/evidence
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - evidence_data:/data/evidence
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres_data:
  evidence_data:
